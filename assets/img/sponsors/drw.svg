<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 56" width="180" height="56">
  <!-- D: vertical stem + curved right side -->
  <rect x="2" y="4" width="10" height="48" fill="#ffffff"/>
  <rect x="2" y="4" width="30" height="10" fill="#ffffff"/>
  <rect x="2" y="42" width="30" height="10" fill="#ffffff"/>
  <rect x="32" y="4" width="10" height="10" fill="#ffffff"/>
  <rect x="36" y="12" width="8" height="8" fill="#ffffff"/>
  <rect x="38" y="20" width="6" height="12" fill="#ffffff"/>
  <rect x="36" y="32" width="8" height="8" fill="#ffffff"/>
  <rect x="32" y="40" width="10" height="10" fill="#ffffff"/>

  <!-- R: vertical stem + top bump + diagonal leg -->
  <rect x="54" y="4" width="10" height="48" fill="#ffffff"/>
  <rect x="54" y="4" width="28" height="10" fill="#ffffff"/>
  <rect x="54" y="26" width="24" height="10" fill="#ffffff"/>
  <rect x="82" y="4" width="8" height="10" fill="#ffffff"/>
  <rect x="86" y="12" width="6" height="8" fill="#ffffff"/>
  <rect x="88" y="18" width="4" height="8" fill="#ffffff"/>
  <rect x="86" y="26" width="6" height="2" fill="#ffffff"/>
  <!-- diagonal leg of R -->
  <polygon points="78,36 88,36 96,52 86,52" fill="#ffffff"/>

  <!-- W: three bars + cyan chevron -->
  <rect x="106" y="4" width="9" height="40" rx="1" fill="#ffffff"/>
  <rect x="121" y="4" width="9" height="40" rx="1" fill="#ffffff"/>
  <rect x="136" y="4" width="9" height="40" rx="1" fill="#ffffff"/>
  <polygon points="106,44 145,44 125.5,56" fill="#00d4e8"/>
