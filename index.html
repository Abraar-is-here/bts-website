  <!-- Favicon: reuse the brand bull mark -->

  <!-- Design tokens first (order matters: fonts -> colors -> spacing ->
       typography), then the layout/component styles. Loaded as direct links
       so they fetch in parallel (no @import waterfall).
       The ?v= query is a cache-buster: bump it whenever you edit a CSS file so
       returning visitors (and the dev server) pick up the change immediately. -->
  <link rel="stylesheet" href="styles/tokens/fonts.css?v=7" />
  <link rel="stylesheet" href="styles/tokens/colors.css?v=13" />
  <link rel="stylesheet" href="styles/tokens/spacing.css?v=7" />

  <!-- Skip-link: first focusable element, lets keyboard users jump past the
       nav straight to the hero content. -->
  <a class="skip-link" href="#top">Skip to content</a>

  <!-- =====================================================================
       Animated aurora background
       ---------------------------------------------------------------------
       Fixed, full-viewport, behind all content (z-index:-1).
       Primary: a hand-written WebGL shader (js/aurora.js) renders a
       domain-warped noise field that morphs continuously through the blue
       palette like liquid. (The ruucm/shadergradient library is React/R3F
       only and needs a bundler, so it can't drop into this no-build setup;
       this canvas reproduces the same technique natively.)
       Fallback: if WebGL is unavailable, the .aurora-fallback layer animates
       a stack of oversized blurred radial gradients instead.
       ===================================================================== -->
  <div class="aurora" aria-hidden="true">
    <canvas id="aurora-canvas"></canvas>
    <div class="aurora-fallback">
      <span class="b1"></span>
      <span class="b2"></span>
      <span class="b3"></span>
      <span class="b4"></span>
      <span class="b5"></span>
      <span class="b6"></span>
      <span class="sheen"></span>
    </div>
  </div>
